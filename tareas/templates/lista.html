{% if messages %}
  {% for message in messages %}
    <p>{{ message }}</p>
  {% endfor %}
{% endif %}

<h1>Tareas</h1>

<a href="{% url 'crear' %}">Nueva tarea</a>

<ul>
  {% for tarea in tareas %}
    <li>
      {{ tarea.titulo }}
      <a href="{% url 'editar' tarea.id %}">Editar</a>
      <a href="{% url 'eliminar' tarea.id %}">Eliminar</a>
    </li>
  {% endfor %}
</ul>
